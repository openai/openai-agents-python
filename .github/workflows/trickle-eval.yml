name: Trickle Agent Eval

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install project dependencies
        run: pip install -e .

      - name: Run agent eval
        uses: yiheinchai/trickle@v1.0.0
        with:
          command: "python examples/basic/hello_world.py"
          fail-under: 0
